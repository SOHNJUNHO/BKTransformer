name: Training Test

on:
  workflow_dispatch:

jobs:
  training-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run training test
        run: uv run --frozen pytest tests/test_training.py -v
