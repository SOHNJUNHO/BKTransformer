name: Training Test

on:
  workflow_dispatch:

jobs:
  training-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra cpu --extra dev

      - name: Run training test
        run: uv run pytest tests/test_training.py -v
